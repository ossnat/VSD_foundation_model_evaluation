# config.yaml
training:
  epochs: 3
  batch_size: 8
  learning_rate: 0.0005   # lower = smoother; try 0.0001 if still jittery
  device: "auto"
  # optional: reduce LR when val loss plateaus (smoother convergence)
  lr_scheduler: "ReduceLROnPlateau"
  lr_scheduler_patience: 2
  # optional: clip gradients to limit large updates (default null = no clip)
  gradient_clip: 1.0

data:
  dataset_path: "./data/frodo_early"
  num_frames: 5
  num_workers: 4
  start_frame: 28
  end_frame: 58   # use full length if not set


model:
  backbone: "dino3d"         # choices: dino, resnet18, vit
  temporal_pooling: "mean" # choices: mean, max, attention
  embedding_dim: 512
  num_classes: 10
